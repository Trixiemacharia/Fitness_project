{% load static %}

<!--SIDEBAR OVERLAY-->
<div id="sidebarOverlay" class="sidebar-overlay"></div>

<!--SIDEBAR -->
<nav id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <span class="sidebar-logo">Fit<span>Track</span></span>
        <button id="sidebarClose" class="sidebar-close">✕</button>
    </div>

    <div class="sidebar-nav">
        <button class="nav-link active" data-screen="dashboard-screen">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </span>
            Dashboard
        </button>
        <button class="nav-link" data-screen="progress-screen">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            </span>
            Progress
        </button>
        <button class="nav-link" data-screen="profile-screen">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            Profile
        </button>
        <button class="nav-link" data-screen="about-screen">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line xl="12" yl="8" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="12"/></svg>
            </span>
            About
        </button>
                <button class="nav-link" data-screen="contact-screen">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            Contact
        </button>
    </div>

    <!-- Sidebar footer -->
    <div class="sidebar-footer">
        <div class="sidebar-avatar">
            {% if profile.profile_image %}
                <img src="{{ profile.profile_image.url }}" alt="Avatar">
            {% else %}
                <span style="font-family:'Barlow Condensed',sans-serif;font-weight:800;color:#c8f135;font-size:15px;">
                    {{ profile.name|slice:":1"|upper }}
                </span>
            {% endif %}
        </div>
        <div class="sidebar-user-info">
            <div class="sidebar-user-name">{{ profile.name }}</div>
            <div class="sidebar-user-level">{{ profile.fitness_level }}</div>
        </div>
    </div>
</nav>
